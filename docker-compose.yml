version: "3.9"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: event-backend
    ports:
      - "3001:3001"
    environment:
      DATABASE_URL: "file:./dev.db"
      SESSION_SECRET: "super-secret-production-key-change-this"
      PORT: 3001
      NODE_ENV: production
      FRONTEND_URL: "http://localhost:3000"
    volumes:
      - db_data:/app/prisma

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: event-frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: "http://localhost:3001"
    depends_on:
      - backend

volumes:
  db_data:
